<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBI 本地测试</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #1f6feb;
            --primary-soft: #e8f1ff;
            --primary-border: #b8d0ff;
            --border: #e5e7eb;
            --ok: #0a7f47;
            --error: #c62828;
            --user-bg: #ebf3ff;
            --assistant-bg: #f7f8fb;
            --metric-bg: #eefcf5;
            --metric-border: #b7e4cb;
            --dim-bg: #eff6ff;
            --dim-border: #bfdbfe;
            --disabled: #cbd5e1;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #eef3ff 0%, #f9fbff 40%, #ffffff 100%);
            color: var(--text);
        }

        .container {
            max-width: 1220px;
            margin: 0 auto;
            padding: 24px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            margin-bottom: 16px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }

        h3 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .chat-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 180px;
            max-height: 360px;
            overflow-y: auto;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        }

        .message {
            max-width: 88%;
            padding: 12px 14px;
            border-radius: 14px;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--assistant-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message-role {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        textarea {
            width: 100%;
            min-height: 96px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            resize: vertical;
            outline: none;
            font-size: 14px;
        }

        textarea:focus,
        input:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.15);
        }

        .engine-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .engine-row label {
            font-size: 13px;
            color: var(--muted);
        }

        .engine-row select {
            min-width: 220px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 14px;
            background: #fff;
            outline: none;
        }

        .report-toolbar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            align-items: end;
        }

        .toolbar-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toolbar-field label {
            font-size: 13px;
            color: var(--muted);
        }

        .toolbar-field select,
        .toolbar-field input {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 14px;
            background: #fff;
            outline: none;
        }

        .report-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .toolbar-tip {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        button,
        .actions a {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.18s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .secondary-btn {
            background: var(--primary-soft);
            color: var(--primary);
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .status.ok { color: var(--ok); }
        .status.error { color: var(--error); }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }

        .meta-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        }

        .meta-label {
            margin: 0 0 8px;
            font-size: 13px;
            color: var(--muted);
        }

        .meta-value {
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
        }

        .chip-box {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 40px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            line-height: 1;
            border: 1px solid transparent;
        }

        .chip.dimension {
            background: var(--dim-bg);
            border-color: var(--dim-border);
            color: #1d4ed8;
        }

        .chip.metric {
            background: var(--metric-bg);
            border-color: var(--metric-border);
            color: #0a7f47;
        }

        .chip-separator {
            color: var(--muted);
            font-size: 13px;
        }

        .table-wrap {
            overflow: auto;
            max-height: 500px;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border-bottom: 1px solid var(--border);
            padding: 8px 10px;
            text-align: left;
            white-space: nowrap;
        }

        th {
            position: sticky;
            top: 0;
            background: #f9fafb;
            z-index: 1;
        }

        .view-switch {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .view-btn {
            background: #f8fafc;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .view-btn.active {
            background: var(--primary-soft);
            border-color: var(--primary-border);
            color: var(--primary);
        }

        .view-btn.disabled {
            background: #f8fafc;
            border-color: var(--border);
            color: var(--disabled);
            cursor: not-allowed;
        }

        .chart-panel {
            display: none;
            margin-top: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
        }

        .chart-title {
            margin: 0 0 12px;
            font-size: 14px;
            color: var(--muted);
        }

        .chart-svg {
            width: 100%;
            display: block;
        }

        .chart-legend text {
            font-size: 12px;
            fill: var(--text);
        }

        pre {
            background: #0f172a;
            color: #f1f5f9;
            border-radius: 10px;
            padding: 12px;
            overflow-x: auto;
            margin: 0;
            font-size: 13px;
        }

        .time-range-row {
            display: none;
            margin-top: 12px;
            padding: 14px;
            border: 1px dashed var(--primary-border);
            border-radius: 12px;
            background: #f8fbff;
        }

        .time-range-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .time-range-title {
            font-size: 14px;
            color: var(--text);
            font-weight: 600;
        }

        .time-range-tip {
            font-size: 12px;
            color: var(--muted);
        }

        .time-range-inputs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .time-range-inputs input {
            min-width: 180px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: #fff;
        }

        .placeholder-line {
            color: var(--muted);
            font-size: 13px;
        }

        .context-indicator {
            position: fixed;
            right: 22px;
            bottom: 22px;
            z-index: 20;
        }

        .context-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 88px;
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid rgba(31, 111, 235, 0.16);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
            color: var(--text);
            cursor: default;
        }

        .context-badge.warn {
            border-color: rgba(198, 40, 40, 0.24);
        }

        .context-badge-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .context-badge-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            line-height: 1;
        }

        .context-badge-text strong,
        .context-badge-text span {
            font-size: 11px;
        }

        .context-tooltip {
            position: absolute;
            right: 0;
            bottom: 52px;
            display: none;
            width: 280px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.96);
            color: #f8fafc;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.28);
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-line;
        }

        .context-indicator:hover .context-tooltip,
        .context-indicator:focus-within .context-tooltip {
            display: block;
        }

        .task-indicator {
            position: fixed;
            right: 22px;
            bottom: 92px;
            z-index: 21;
        }

        .task-badge {
            min-width: 104px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(31, 111, 235, 0.16);
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
            color: var(--text);
            font-size: 12px;
            font-weight: 700;
        }

        .task-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #94a3b8;
            display: inline-block;
            margin-right: 8px;
        }

        .task-badge.has-active .dot {
            background: #f59e0b;
        }

        .task-badge.has-ready .dot {
            background: #0a7f47;
        }

        .task-panel {
            position: absolute;
            right: 0;
            bottom: 54px;
            width: 360px;
            max-height: 420px;
            overflow: auto;
            display: none;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.18);
        }

        .task-panel.open {
            display: block;
        }

        .task-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            background: #fbfdff;
        }

        .task-item:last-child {
            margin-bottom: 0;
        }

        .task-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .task-name {
            font-size: 13px;
            font-weight: 700;
            line-height: 1.5;
        }

        .task-meta {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .task-actions a,
        .task-actions button {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 8px;
        }

        .log-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .log-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .log-toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .log-toolbar label {
            font-size: 13px;
            color: var(--muted);
        }

        .log-toolbar select {
            min-width: 180px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-size: 13px;
        }

        .log-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #fbfdff;
            overflow: hidden;
        }

        .log-item summary {
            cursor: pointer;
            list-style: none;
            padding: 12px 14px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .log-item summary::-webkit-details-marker {
            display: none;
        }

        .log-meta {
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
        }

        .log-body {
            padding: 0 14px 14px;
        }

        .log-submeta {
            margin-bottom: 12px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.6;
        }

        .json-view {
            background: #0b1220;
            color: #e5eefb;
            border-radius: 10px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.65;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
        }

        .log-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0 10px;
        }

        .log-actions button {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 8px;
        }

        .log-note {
            margin: 8px 0 10px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 12px;
            line-height: 1.6;
        }

        .json-key {
            color: #7dd3fc;
        }

        .json-string {
            color: #86efac;
        }

        .json-number {
            color: #fbbf24;
        }

        .json-boolean {
            color: #fda4af;
        }

        .json-null {
            color: #c4b5fd;
        }

        .diff-view {
            margin-top: 10px;
            border: 1px solid #dbe5f1;
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
        }

        .diff-row {
            display: grid;
            grid-template-columns: 48px 1fr 1fr;
            gap: 0;
            border-bottom: 1px solid #eef2f7;
            font-family: "SFMono-Regular", "Consolas", monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .diff-row:last-child {
            border-bottom: none;
        }

        .diff-mark {
            padding: 8px 10px;
            color: var(--muted);
            background: #f8fafc;
            border-right: 1px solid #eef2f7;
            text-align: center;
            font-weight: 700;
        }

        .diff-col {
            padding: 8px 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .diff-row.added .diff-col.right {
            background: #ecfdf3;
            color: #166534;
        }

        .diff-row.removed .diff-col.left {
            background: #fef2f2;
            color: #991b1b;
        }

        .diff-row.common .diff-col {
            background: #f8fafc;
            color: #475569;
        }

        .diff-empty {
            padding: 12px;
            color: var(--muted);
            font-size: 12px;
            background: #f8fafc;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .message {
                max-width: 100%;
            }

            .time-range-inputs input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>ChatBI 本地测试</h1>
        <div id="chatBox" class="chat-box"></div>
    </div>

    <div class="card">
        <h3>输入问题</h3>
        <textarea id="question" placeholder="示例：按销售大区统计近30天销售金额和订单数，按销售金额降序"></textarea>
        <div class="engine-row">
            <label for="llmProvider">模型引擎</label>
            <select id="llmProvider">
                {% for option in llm_provider_options %}
                <option value="{{ option.value }}">{{ option.label }} / {{ option.model }}</option>
                {% endfor %}
            </select>
        </div>
        <div id="timeRangeRow" class="time-range-row">
            <div class="time-range-head">
                <div>
                    <div id="timeRangeTitle" class="time-range-title">时间范围调整</div>
                    <div id="timeRangeTip" class="time-range-tip"></div>
                </div>
            </div>
            <div class="time-range-inputs">
                <input id="timeRangeStart" type="date">
                <input id="timeRangeEnd" type="date">
            </div>
        </div>
        <div class="actions">
            <button id="submitBtn">发送问题</button>
            <button id="newConversationBtn" class="secondary-btn">新对话</button>
            <a id="semanticAdminBtn" class="secondary-btn" href="/admin/semantic" target="_blank" rel="noopener noreferrer">语义层维护</a>
            <a id="reportAdminBtn" class="secondary-btn" href="/admin/report" target="_blank" rel="noopener noreferrer">报告后台</a>
        </div>
        <div id="status" class="status">等待输入问题...</div>
    </div>

    <div class="card">
        <h3>指标信息</h3>
        <div class="meta-grid">
            <div class="meta-item">
                <p class="meta-label">指标定义</p>
                <p id="metricDefinition" class="meta-value">-- 暂无指标定义</p>
            </div>
            <div class="meta-item">
                <p class="meta-label">指标描述</p>
                <p id="metricDescription" class="meta-value">-- 暂无指标描述</p>
            </div>
            <div class="meta-item">
                <p class="meta-label">维度</p>
                <div id="dimensionBox" class="chip-box"><span class="placeholder-line">-- 暂无维度</span></div>
            </div>
            <div class="meta-item">
                <p class="meta-label">指标</p>
                <div id="metricBox" class="chip-box"><span class="placeholder-line">-- 暂无指标</span></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>查询结果</h3>
        <div id="tableSection" class="table-wrap">
            <table id="resultTable"></table>
        </div>
        <div class="view-switch">
            <button id="tableViewBtn" class="view-btn active">列表</button>
            <button id="barViewBtn" class="view-btn disabled">柱图</button>
            <button id="pieViewBtn" class="view-btn disabled">饼图</button>
        </div>
        <div id="chartPanel" class="chart-panel"></div>
    </div>

    <div class="card">
        <h3>导出与报告</h3>
        <div class="report-toolbar">
            <div class="toolbar-field">
                <label for="reportTemplateSelect">报告模板</label>
                <select id="reportTemplateSelect"></select>
            </div>
            <div class="toolbar-field">
                <label for="templateSampleFormatSelect">模板样例格式</label>
                <select id="templateSampleFormatSelect">
                    <option value="docx">Word</option>
                    <option value="txt">文本模板 TXT</option>
                </select>
            </div>
        </div>
        <div class="report-actions">
            <button id="downloadDataBtn" class="secondary-btn" disabled>下载明细数据</button>
            <button id="downloadChartWordBtn" class="secondary-btn" disabled>下载图表Word</button>
            <button id="generateReportBtn" disabled>生成商业报告</button>
            <button id="downloadTemplateSampleBtn" class="secondary-btn">下载模板样例</button>
            <button id="uploadTemplateBtn" class="secondary-btn">上传自定义模板</button>
        </div>
        <div class="toolbar-tip">支持上传 .docx / .txt / .md 报告模板。Word 模板会校验章节和样式结构；文本模板会校验是否具备正常商业报告提示词要素。</div>
        <input id="reportTemplateFileInput" type="file" accept=".docx,.txt,.md,text/plain,text/markdown" hidden>
    </div>

    <div class="card">
        <h3>生成 SQL</h3>
        <pre id="sqlBox">-- 暂无 SQL</pre>
    </div>

    <div class="card">
        <h3>执行日志</h3>
        <div class="log-toolbar">
            <div class="log-toolbar-left">
                <label for="logRoundFilter">按轮次过滤</label>
                <select id="logRoundFilter">
                    <option value="all">全部轮次</option>
                </select>
                <label style="display:flex;align-items:center;gap:6px;">
                    <input id="logFailedOnly" type="checkbox">
                    <span>只看失败调用</span>
                </label>
            </div>
            <div class="log-toolbar-left">

                <button id="refreshLogBtn" class="secondary-btn" type="button">刷新日志</button>
            </div>
        </div>

            <span class="placeholder-line">-- 暂无执行日志</span>
        </div>
    </div>
</div>

压缩量：0%
剩余额度：100%</div>

    const submitBtn = document.getElementById('submitBtn');
    const newConversationBtn = document.getElementById('newConversationBtn');
    const questionInput = document.getElementById('question');
    const chatBox = document.getElementById('chatBox');
    const statusEl = document.getElementById('status');
    const metricDefinitionEl = document.getElementById('metricDefinition');
    const metricDescriptionEl = document.getElementById('metricDescription');
    const dimensionBoxEl = document.getElementById('dimensionBox');
    const metricBoxEl = document.getElementById('metricBox');
    const tableEl = document.getElementById('resultTable');
    const tableSectionEl = document.getElementById('tableSection');
    const chartPanelEl = document.getElementById('chartPanel');
    const tableViewBtn = document.getElementById('tableViewBtn');
    const barViewBtn = document.getElementById('barViewBtn');
    const pieViewBtn = document.getElementById('pieViewBtn');
    const sqlBox = document.getElementById('sqlBox');
    const timeRangeRowEl = document.getElementById('timeRangeRow');
    const timeRangeTitleEl = document.getElementById('timeRangeTitle');
    const timeRangeTipEl = document.getElementById('timeRangeTip');
    const timeRangeStartEl = document.getElementById('timeRangeStart');
    const timeRangeEndEl = document.getElementById('timeRangeEnd');
    const llmProviderSelect = document.getElementById('llmProvider');
    const reportTemplateSelect = document.getElementById('reportTemplateSelect');
    const templateSampleFormatSelect = document.getElementById('templateSampleFormatSelect');
    const downloadDataBtn = document.getElementById('downloadDataBtn');
    const downloadChartWordBtn = document.getElementById('downloadChartWordBtn');
    const generateReportBtn = document.getElementById('generateReportBtn');
    const downloadTemplateSampleBtn = document.getElementById('downloadTemplateSampleBtn');
    const uploadTemplateBtn = document.getElementById('uploadTemplateBtn');
    const reportTemplateFileInput = document.getElementById('reportTemplateFileInput');
    const logRoundFilterEl = document.getElementById('logRoundFilter');
    const logFailedOnlyEl = document.getElementById('logFailedOnly');
    const exportLogBtn = document.getElementById('exportLogBtn');
    const refreshLogBtn = document.getElementById('refreshLogBtn');
    const executionLogPanelEl = document.getElementById('executionLogPanel');
    const taskIndicator = document.getElementById('taskIndicator');
    const taskBadgeEl = document.getElementById('taskBadge');
    const taskBadgeTextEl = document.getElementById('taskBadgeText');
    const taskPanelEl = document.getElementById('taskPanel');
    const taskListEl = document.getElementById('taskList');
    const contextBadgeEl = document.getElementById('contextBadge');
    const contextCompressionTextEl = document.getElementById('contextCompressionText');
    const contextRemainingTextEl = document.getElementById('contextRemainingText');
    const contextTooltipEl = document.getElementById('contextTooltip');

    const CHART_COLORS = ['#1f6feb', '#0ea5e9', '#0a7f47', '#f59e0b', '#ef4444', '#8b5cf6', '#14b8a6', '#f97316', '#84cc16', '#e11d48', '#06b6d4', '#4f46e5'];
    const CONVERSATION_STORAGE_KEY = 'chatbi_conversation_id';
    const LLM_PROVIDER_STORAGE_KEY = 'chatbi_llm_provider';
    const CLIENT_ID_STORAGE_KEY = 'chatbi_client_id';
    const DEFAULT_LLM_PROVIDER = {{ default_llm_provider|tojson }};

    let conversationId = loadConversationId();
    let clientId = loadClientId();
    let currentResultState = {
        columns: [],
        rows: [],
        chartTitle: '',
        chartLabelField: '',
        chartValueField: '',
        chartItems: null,
        activeView: 'list',
    };
    let lastTimeMeta = {
        enabled: false,
        dimension: '',
        granularity: 'none',
        start: '',
        end: '',
    };
    let pendingTimeRefinement = false;
    let reportTemplates = [];
    let currentTaskItems = [];
    let currentExecutionLogs = [];
    const logDisplayCache = new Map();
    let taskPanelOpen = false;
    let taskPollTimer = null;

    function buildDefaultContextStats() {
        return {
            strategy_label: '滚动摘要 + 最近窗口',
            llm_provider_label: llmProviderSelect.options[llmProviderSelect.selectedIndex]?.text || '',
            max_input_tokens: 0,
            estimated_prompt_tokens: 0,
            remaining_tokens: 0,
            remaining_ratio: 1,
            source_message_count: 0,
            recent_message_count: 0,
            summarized_message_count: 0,
            saved_tokens: 0,
            compression_ratio: 0,
        };
    }

    function createConversationId() {
        return `conv_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
    }

    function loadConversationId() {
        return window.localStorage.getItem(CONVERSATION_STORAGE_KEY) || createConversationId();
    }

    function createClientId() {
        return `client_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
    }

    function loadClientId() {
        const existing = window.localStorage.getItem(CLIENT_ID_STORAGE_KEY);
        if (existing) {
            return existing;
        }
        const created = createClientId();
        window.localStorage.setItem(CLIENT_ID_STORAGE_KEY, created);
        return created;
    }

    function persistConversationId() {
        window.localStorage.setItem(CONVERSATION_STORAGE_KEY, conversationId);
    }

    function loadLlmProvider() {
        return window.localStorage.getItem(LLM_PROVIDER_STORAGE_KEY) || DEFAULT_LLM_PROVIDER;
    }

    function persistLlmProvider(provider) {
        window.localStorage.setItem(LLM_PROVIDER_STORAGE_KEY, provider);
    }

    function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = `status ${type || ''}`;
    }

    function toPercent(value) {
        const num = Number(value);
        if (!Number.isFinite(num)) return 0;
        return Math.max(0, Math.min(100, Math.round(num * 100)));
    }

    function updateContextIndicator(rawStats) {
        const stats = rawStats || buildDefaultContextStats();
        const compressionPct = toPercent(stats.compression_ratio);
        const remainingPct = stats.max_input_tokens ? toPercent(stats.remaining_ratio) : 100;
        contextCompressionTextEl.textContent = `压${compressionPct}%`;
        contextRemainingTextEl.textContent = `余${remainingPct}%`;
        contextBadgeEl.classList.toggle('warn', remainingPct <= 15);
        contextTooltipEl.textContent = [
            `上下文策略：${stats.strategy_label || '滚动摘要 + 最近窗口'}`,
            `压缩量：${compressionPct}%`,
            `剩余额度：${remainingPct}%`,
            `原始消息数：${stats.source_message_count || 0}`,
            `摘要消息数：${stats.summarized_message_count || 0}`,
            `保留最近消息数：${stats.recent_message_count || 0}`,
            `估算输入 tokens：${stats.estimated_prompt_tokens || 0}`,
            `估算剩余 tokens：${stats.remaining_tokens || 0}`,
            `当前引擎：${stats.llm_provider_label || (llmProviderSelect.options[llmProviderSelect.selectedIndex]?.text || '--')}`,
            `${stats.summary_updated ? '本轮摘要已更新' : '本轮未触发新的摘要更新'}`,
        ].join('\n');
    }

    function getSelectedTemplateId() {
        return reportTemplateSelect.value || '';
    }

    function syncReportTemplateOptions(templates, preferredId) {
        reportTemplates = Array.isArray(templates) ? templates : [];
        reportTemplateSelect.innerHTML = '';
        if (!reportTemplates.length) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = '默认模板';
            reportTemplateSelect.appendChild(option);
            return;
        }

        reportTemplates.forEach(template => {
            const option = document.createElement('option');
            option.value = template.template_id;
            option.textContent = template.is_default
                ? `${template.template_name}（默认）`
                : template.template_name;
            reportTemplateSelect.appendChild(option);
        });

        const templateIds = new Set(reportTemplates.map(item => item.template_id));
        if (preferredId && templateIds.has(preferredId)) {
            reportTemplateSelect.value = preferredId;
            return;
        }
        const defaultTemplate = reportTemplates.find(item => item.is_default) || reportTemplates[0];
        if (defaultTemplate) {
            reportTemplateSelect.value = defaultTemplate.template_id;
        }
    }

    function hasResultRows() {
        return Array.isArray(currentResultState.rows) && currentResultState.rows.length > 0;
    }

    function hasChartExport() {
        return !!currentResultState.chartItems && currentResultState.chartItems.length > 0;
    }

    function updateExportButtons() {
        const hasRows = hasResultRows();
        downloadDataBtn.disabled = !hasRows;
        generateReportBtn.disabled = !hasRows || !getSelectedTemplateId();
        downloadChartWordBtn.disabled = !hasRows || !hasChartExport() || !getSelectedTemplateId();
    }

    function updateSubmitButtonText() {
        const question = questionInput.value.trim();
        submitBtn.textContent = (!question && pendingTimeRefinement) ? '再次提问' : '发送问题';
    }

    function addMessage(role, text) {
        const messageEl = document.createElement('div');
        messageEl.className = `message ${role}`;

        const roleEl = document.createElement('span');
        roleEl.className = 'message-role';
        roleEl.textContent = role === 'user' ? '你' : '助手';

        const textEl = document.createElement('div');
        textEl.textContent = text;

        messageEl.appendChild(roleEl);
        messageEl.appendChild(textEl);
        chatBox.appendChild(messageEl);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderChipList(container, values, type, emptyText) {
        container.innerHTML = '';
        if (!values || values.length === 0) {
            container.innerHTML = `<span class="placeholder-line">${emptyText}</span>`;
            return;
        }
        values.forEach((value, index) => {
            const chip = document.createElement('span');
            chip.className = `chip ${type}`;
            chip.textContent = value;
            container.appendChild(chip);
            if (index < values.length - 1) {
                const separator = document.createElement('span');
                separator.className = 'chip-separator';
                separator.textContent = '•';
                container.appendChild(separator);
            }
        });
    }

    function renderTable(columns, rows) {
        if (!columns || columns.length === 0) {
            tableEl.innerHTML = '<tr><td>无结果</td></tr>';
            return;
        }
        const thead = `<thead><tr>${columns.map(col => `<th>${col}</th>`).join('')}</tr></thead>`;
        const tbodyRows = rows.map(row => `<tr>${columns.map(col => `<td>${row[col] ?? ''}</td>`).join('')}</tr>`).join('');
        tableEl.innerHTML = thead + `<tbody>${tbodyRows}</tbody>`;
    }

    function resetResultState() {
        currentResultState = {
            columns: [],
            rows: [],
            chartTitle: '',
            chartLabelField: '',
            chartValueField: '',
            chartItems: null,
            activeView: 'list',
        };
        tableEl.innerHTML = '';
        chartPanelEl.innerHTML = '';
        chartPanelEl.style.display = 'none';
        tableSectionEl.style.display = 'block';
        setViewButtonState(tableViewBtn, true, true);
        setViewButtonState(barViewBtn, false, false);
        setViewButtonState(pieViewBtn, false, false);
    }

    function resetPanels() {
        metricDefinitionEl.textContent = '-- 暂无指标定义';
        metricDescriptionEl.textContent = '-- 暂无指标描述';
        renderChipList(dimensionBoxEl, [], 'dimension', '-- 暂无维度');
        renderChipList(metricBoxEl, [], 'metric', '-- 暂无指标');
        sqlBox.textContent = '-- 暂无 SQL';
        resetResultState();
        hideTimeRange();
        updateContextIndicator(null);
        updateExportButtons();
    }

    function decodeHtmlEntities(value) {
        const textarea = document.createElement('textarea');
        textarea.innerHTML = String(value ?? '');
        return textarea.value;
    }

    function tryParseJson(rawValue) {
        if (rawValue === null || rawValue === undefined) {
            return null;
        }
        if (typeof rawValue === 'object') {
            return rawValue;
        }
        const text = String(rawValue).trim();
        if (!text) {
            return null;
        }
        try {
            return JSON.parse(text);
        } catch (error) {
            return null;
        }
    }

    function wrapLongText(text, size = 160) {
        return String(text ?? '').split('\n').map(line => {
            if (line.length <= size) {
                return line;
            }
            const chunks = [];
            for (let index = 0; index < line.length; index += size) {
                chunks.push(line.slice(index, index + size));
            }
            return chunks.join('\n');
        }).join('\n');
    }

    function normalizeLogValue(value) {
        if (Array.isArray(value)) {
            return value.map(item => normalizeLogValue(item));
        }
        if (value && typeof value === 'object') {
            const normalized = {};
            Object.entries(value).forEach(([key, item]) => {
                normalized[key] = normalizeLogValue(item);
            });
            return normalized;
        }
        if (typeof value === 'string') {
            const decoded = decodeHtmlEntities(value);
            if (decoded.startsWith('data:image/')) {
                return `[图片数据，已省略，长度 ${decoded.length} 字符]`;
            }
            const nested = tryParseJson(decoded);
            return nested !== null ? normalizeLogValue(nested) : wrapLongText(decoded);
        }
        return value;
    }

    function formatDisplayJson(value, indent = 0) {
        const pad = '  '.repeat(indent);
        if (Array.isArray(value)) {
            if (!value.length) {
                return '[]';
            }
            return `[\n${value.map(item => `${'  '.repeat(indent + 1)}${formatDisplayJson(item, indent + 1)}`).join(',\n')}\n${pad}]`;
        }
        if (value && typeof value === 'object') {
            const entries = Object.entries(value);
            if (!entries.length) {
                return '{}';
            }
            return `{\n${entries.map(([key, item]) => {
                if (typeof item === 'string' && item.includes('\n')) {
                    return `${'  '.repeat(indent + 1)}"${key}": """\n${item.split('\n').map(line => `${'  '.repeat(indent + 2)}${line}`).join('\n')}\n${'  '.repeat(indent + 1)}"""`;
                }
                return `${'  '.repeat(indent + 1)}"${key}": ${formatDisplayJson(item, indent + 1)}`;
            }).join(',\n')}\n${pad}}`;
        }
        if (typeof value === 'string') {
            return JSON.stringify(value);
        }
        return JSON.stringify(value);
    }

    function prepareLogDisplay(rawText, kind) {
        const parsed = normalizeLogValue(tryParseJson(rawText) ?? decodeHtmlEntities(rawText || ''));
        const nestedContent = parsed && typeof parsed === 'object' && !Array.isArray(parsed)
            ? parsed.content
            : null;
        const isSqlOnlyResponse = kind === 'response'
            && nestedContent
            && typeof nestedContent === 'object'
            && !Array.isArray(nestedContent)
            && Object.keys(nestedContent).length === 1
            && typeof nestedContent.sql === 'string';
        const displayObject = isSqlOnlyResponse
            ? {
                提示: '模型本轮主要返回 SQL 修复结果，请看页面最下方“生成 SQL”区域。',
                返回类型: 'SQL 修复结果',
                SQL长度: nestedContent.sql.length,
            }
            : parsed;
        return {
            plainText: typeof displayObject === 'string' ? wrapLongText(displayObject) : formatDisplayJson(displayObject),
            rawPlainText: typeof parsed === 'string' ? wrapLongText(parsed) : formatDisplayJson(parsed),
            note: isSqlOnlyResponse ? '模型本轮主要返回 SQL 修复结果，页面已优先提示你直接查看“生成 SQL”。' : '',
        };
    }

    function renderExecutionLogs(logs) {
        const filteredLogs = Array.isArray(logs) ? logs : [];
        logDisplayCache.clear();
        if (filteredLogs.length === 0) {
            executionLogPanelEl.innerHTML = '<span class="placeholder-line">-- 暂无执行日志</span>';
            return;
        }
        executionLogPanelEl.innerHTML = filteredLogs.map((log, index) => `
            <details class="log-item" ${index === filteredLogs.length - 1 ? 'open' : ''}>
                <summary>
                    <span>${escapeHtml(log.stage || '--')} / ${escapeHtml(log.llm_provider || '--')} / ${escapeHtml(log.model_name || '--')}</span>
                    <span class="log-meta">${escapeHtml(log.created_at || '--')}</span>
                </summary>
                <div class="log-body">
                    <div class="log-submeta">
                        轮次：${escapeHtml(formatRoundLabel(log.round_no))}<br>
                        请求链路：${escapeHtml(log.request_id || '--')}
                    </div>
                    <div class="toolbar-tip">发送给模型的 JSON</div>
                    <div class="log-actions">
                        <button class="secondary-btn copy-log-btn" type="button" data-log-id="${escapeHtml(String(log.id))}" data-copy-type="request">复制请求内容</button>
                    </div>
                    <pre class="json-view">${syntaxHighlightJson(prepareLogDisplay(log.request_json || '{}', 'request').plainText)}</pre>
                    ${log.response_json ? `
                        <div class="toolbar-tip">模型返回</div>
                        ${prepareLogDisplay(log.response_json || '{}', 'response').note ? `<div class="log-note">${escapeHtml(prepareLogDisplay(log.response_json || '{}', 'response').note)}</div>` : ''}
                        <div class="log-actions">
                            <button class="secondary-btn copy-log-btn" type="button" data-log-id="${escapeHtml(String(log.id))}" data-copy-type="response">复制返回内容</button>
                        </div>
                        <pre class="json-view">${syntaxHighlightJson(prepareLogDisplay(log.response_json || '{}', 'response').plainText)}</pre>
                        <details style="margin-top:10px;">
                            <summary style="cursor:pointer;color:#1f6feb;font-size:12px;font-weight:700;">折叠查看 prompt / response diff</summary>
                            ${buildJsonDiffHtml(prepareLogDisplay(log.request_json || '{}', 'request').rawPlainText, prepareLogDisplay(log.response_json || '{}', 'response').rawPlainText)}
                        </details>
                    ` : ''}
                    ${log.error_message ? `<div class="toolbar-tip" style="color:#c62828;">调用异常：${escapeHtml(log.error_message)}</div>` : ''}
                </div>
            </details>
        `).join('');
        filteredLogs.forEach(log => {
            logDisplayCache.set(`${log.id}:request`, prepareLogDisplay(log.request_json || '{}', 'request').rawPlainText);
            if (log.response_json) {
                logDisplayCache.set(`${log.id}:response`, prepareLogDisplay(log.response_json || '{}', 'response').rawPlainText);
            }
        });
        Array.from(executionLogPanelEl.querySelectorAll('.copy-log-btn')).forEach(button => {
            button.addEventListener('click', async () => {
                const cacheKey = `${button.dataset.logId}:${button.dataset.copyType}`;
                const content = logDisplayCache.get(cacheKey) || '';
                try {
                    await navigator.clipboard.writeText(content);
                    setStatus(button.dataset.copyType === 'request' ? '请求内容已复制' : '返回内容已复制', 'ok');
                } catch (error) {
                    setStatus(`复制失败：${error.message}`, 'error');
                }
            });
        });
    }

    async function loadExecutionLogs() {
        if (!conversationId) {
            currentExecutionLogs = [];
            renderLogRoundOptions([]);
            renderExecutionLogs([]);
            return;
        }
        const response = await fetch(`/api/conversation/${encodeURIComponent(conversationId)}/logs`);
        const data = await readJsonResponse(response);
        if (!response.ok) {
            throw new Error(data.error || '加载执行日志失败');
        }
        currentExecutionLogs = Array.isArray(data.logs) ? data.logs : [];
        renderLogRoundOptions(currentExecutionLogs);
        renderFilteredExecutionLogs();
    }

    function formatRoundLabel(roundNo) {
        const value = Number(roundNo || 0);
        return value > 0 ? `第${value}轮` : '系统轮次';
    }

    function renderLogRoundOptions(logs) {
        const previousValue = logRoundFilterEl.value || 'all';
        const rounds = Array.from(new Set((Array.isArray(logs) ? logs : []).map(item => Number(item.round_no || 0))));
        rounds.sort((a, b) => a - b);
        logRoundFilterEl.innerHTML = '<option value="all">全部轮次</option>' + rounds.map(roundNo => (
            `<option value="${roundNo}">${escapeHtml(formatRoundLabel(roundNo))}</option>`
        )).join('');
        if (previousValue !== 'all' && rounds.includes(Number(previousValue))) {
            logRoundFilterEl.value = previousValue;
        }
    }

    function renderFilteredExecutionLogs() {
        const filterValue = logRoundFilterEl.value || 'all';
        const failedOnly = !!logFailedOnlyEl.checked;
        let logs = filterValue === 'all'
            ? currentExecutionLogs
            : currentExecutionLogs.filter(item => Number(item.round_no || 0) === Number(filterValue));
        if (failedOnly) {
            logs = logs.filter(item => !!item.error_message);
        }
        renderExecutionLogs(logs);
    }

    function prettyJsonText(rawText) {
        return prepareLogDisplay(rawText, 'request').rawPlainText;
    }

    function buildDiffRows(leftLines, rightLines) {
        const maxCells = leftLines.length * rightLines.length;
        if (maxCells > 40000) {
            return [
                ...leftLines.map(line => ({ type: 'removed', left: line, right: '' })),
                ...rightLines.map(line => ({ type: 'added', left: '', right: line })),
            ];
        }
        const dp = Array.from({ length: leftLines.length + 1 }, () => Array(rightLines.length + 1).fill(0));
        for (let i = leftLines.length - 1; i >= 0; i -= 1) {
            for (let j = rightLines.length - 1; j >= 0; j -= 1) {
                if (leftLines[i] === rightLines[j]) {
                    dp[i][j] = dp[i + 1][j + 1] + 1;
                } else {
                    dp[i][j] = Math.max(dp[i + 1][j], dp[i][j + 1]);
                }
            }
        }
        const rows = [];
        let i = 0;
        let j = 0;
        while (i < leftLines.length && j < rightLines.length) {
            if (leftLines[i] === rightLines[j]) {
                rows.push({ type: 'common', left: leftLines[i], right: rightLines[j] });
                i += 1;
                j += 1;
            } else if (dp[i + 1][j] >= dp[i][j + 1]) {
                rows.push({ type: 'removed', left: leftLines[i], right: '' });
                i += 1;
            } else {
                rows.push({ type: 'added', left: '', right: rightLines[j] });
                j += 1;
            }
        }
        while (i < leftLines.length) {
            rows.push({ type: 'removed', left: leftLines[i], right: '' });
            i += 1;
        }
        while (j < rightLines.length) {
            rows.push({ type: 'added', left: '', right: rightLines[j] });
            j += 1;
        }
        return rows;
    }

    function buildJsonDiffHtml(leftRaw, rightRaw) {
        const leftText = prettyJsonText(leftRaw);
        const rightText = prettyJsonText(rightRaw);
        if (!rightText) {
            return '<div class="diff-empty">-- 无模型返回内容</div>';
        }
        const rows = buildDiffRows(leftText.split('\n'), rightText.split('\n'));
        if (!rows.length) {
            return '<div class="diff-empty">-- 无差异</div>';
        }
        return `<div class="diff-view">${rows.map(row => `
            <div class="diff-row ${row.type}">
                <div class="diff-mark">${row.type === 'added' ? '+' : row.type === 'removed' ? '-' : '='}</div>
                <div class="diff-col left">${escapeHtml(row.left || '')}</div>
                <div class="diff-col right">${escapeHtml(row.right || '')}</div>
            </div>
        `).join('')}</div>`;
    }

    function renderTaskWidget(tasks) {
        currentTaskItems = Array.isArray(tasks) ? tasks : [];
        const activeCount = currentTaskItems.filter(item => ['pending', 'running'].includes(item.status)).length;
        const readyCount = currentTaskItems.filter(item => item.status === 'succeeded' && item.result && item.result.file_path).length;

    function toNumber(value) {
        if (value === null || value === undefined || value === '') {
            return null;
        }
        const normalized = String(value).replace(/,/g, '');
        const parsed = Number(normalized);
        return Number.isFinite(parsed) ? parsed : null;
    }

    function escapeXml(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function syntaxHighlightJson(rawText) {
        let formatted = rawText || '';
        try {
            formatted = JSON.stringify(JSON.parse(rawText || '{}'), null, 2);
        } catch (error) {
            formatted = String(rawText || '');
        }
        return escapeHtml(formatted).replace(
            /(&quot;.*?&quot;)(\s*:)?|\b(true|false)\b|\bnull\b|-?\d+(?:\.\d+)?/g,
            match => {
                if (/^&quot;.*&quot;$/.test(match) && match.endsWith('&quot;') && !match.endsWith('&quot;:')) {
                    return `<span class=\"json-string\">${match}</span>`;
                }
                if (match.endsWith(':')) {
                    const key = match.slice(0, -1);
                    return `<span class=\"json-key\">${key}</span>:`;
                }
                if (match === 'true' || match === 'false') {
                    return `<span class=\"json-boolean\">${match}</span>`;
                }
                if (match === 'null') {
                    return `<span class=\"json-null\">${match}</span>`;
                }
                if (/^-?\d/.test(match)) {
                    return `<span class=\"json-number\">${match}</span>`;
                }
                return `<span class=\"json-string\">${match}</span>`;
            }
        );
    }

    function compactSeries(items, maxItems = 12) {
        if (items.length <= maxItems) {
            return items;
        }
        const kept = items.slice(0, maxItems - 1);
        const otherValue = items.slice(maxItems - 1).reduce((sum, item) => sum + item.value, 0);
        kept.push({ label: '其他', value: otherValue });
        return kept;
    }

    function detectChartSeries(columns, rows, preferredLabelField, preferredValueField) {
        if (!rows || rows.length === 0 || !columns || columns.length === 0) {
            return null;
        }

        const numericColumns = columns.filter(col => rows.some(row => toNumber(row[col]) !== null) && rows.every(row => row[col] === null || row[col] === undefined || toNumber(row[col]) !== null));
        const labelColumns = columns.filter(col => !numericColumns.includes(col));

        let items = [];

        if (preferredLabelField && preferredValueField && columns.includes(preferredValueField)) {
            if (rows.length > 1) {
                items = rows.map((row, index) => ({
                    label: String(row[preferredLabelField] ?? `第${index + 1}行`),
                    value: toNumber(row[preferredValueField]),
                }));
            } else {
                const value = toNumber(rows[0][preferredValueField]);
                items = [{ label: String(rows[0][preferredLabelField] ?? preferredValueField), value }];
            }
        } else if (rows.length === 1) {
            items = numericColumns.map(col => ({ label: col, value: toNumber(rows[0][col]) }));
        } else {
            const valueColumn = preferredValueField && numericColumns.includes(preferredValueField) ? preferredValueField : numericColumns[0];
            const labelColumn = preferredLabelField && columns.includes(preferredLabelField)
                ? preferredLabelField
                : (labelColumns[0] || columns[0]);
            if (!valueColumn) {
                return null;
            }
            items = rows.map((row, index) => ({
                label: String(row[labelColumn] ?? `第${index + 1}行`),
                value: toNumber(row[valueColumn]),
            }));
        }

        items = items.filter(item => item.value !== null);
        if (items.length === 0) {
            return null;
        }
        return compactSeries(items);
    }

    function renderBarChart(items, title) {
        const width = 760;
        const rowHeight = 34;
        const topPadding = 24;
        const leftLabelWidth = 160;
        const rightPadding = 90;
        const barMaxWidth = width - leftLabelWidth - rightPadding;
        const height = topPadding + items.length * rowHeight + 20;
        const maxValue = Math.max(...items.map(item => item.value), 1);

        const bars = items.map((item, index) => {
            const y = topPadding + index * rowHeight;
            const barWidth = (item.value / maxValue) * barMaxWidth;
            const color = CHART_COLORS[index % CHART_COLORS.length];
            return `
                <text x="0" y="${y + 18}" font-size="12" fill="#1f2937">${escapeXml(item.label)}</text>
                <rect x="${leftLabelWidth}" y="${y + 4}" width="${barWidth}" height="18" rx="6" fill="${color}"></rect>
                <text x="${leftLabelWidth + barWidth + 8}" y="${y + 18}" font-size="12" fill="#1f2937">${escapeXml(item.value.toFixed(2))}</text>
            `;
        }).join('');

        return `
            <p class="chart-title">${escapeXml(title)} - 柱图</p>
            <svg class="chart-svg" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
                ${bars}
            </svg>
        `;
    }

    function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
        const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
        return {
            x: centerX + radius * Math.cos(angleInRadians),
            y: centerY + radius * Math.sin(angleInRadians),
        };
    }

    function describeArc(centerX, centerY, radius, startAngle, endAngle) {
        const start = polarToCartesian(centerX, centerY, radius, endAngle);
        const end = polarToCartesian(centerX, centerY, radius, startAngle);
        const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
        return ['M', centerX, centerY, 'L', start.x, start.y, 'A', radius, radius, 0, largeArcFlag, 0, end.x, end.y, 'Z'].join(' ');
    }

    function renderPieChart(items, title) {
        const width = 760;
        const height = 360;
        const centerX = 180;
        const centerY = 180;
        const radius = 110;
        const total = items.reduce((sum, item) => sum + item.value, 0);
        if (total <= 0) {
            return '';
        }

        let startAngle = 0;
        const paths = [];
        const legends = [];
        items.forEach((item, index) => {
            const angle = (item.value / total) * 360;
            const endAngle = startAngle + angle;
            const color = CHART_COLORS[index % CHART_COLORS.length];
            paths.push(`<path d="${describeArc(centerX, centerY, radius, startAngle, endAngle)}" fill="${color}"></path>`);
            legends.push(`
                <rect x="370" y="${40 + index * 24}" width="12" height="12" rx="3" fill="${color}"></rect>
                <text x="390" y="${50 + index * 24}">${escapeXml(item.label)} (${((item.value / total) * 100).toFixed(1)}%)</text>
            `);
            startAngle = endAngle;
        });

        return `
            <p class="chart-title">${escapeXml(title)} - 饼图</p>
            <svg class="chart-svg" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
                ${paths.join('')}
                <circle cx="${centerX}" cy="${centerY}" r="48" fill="#ffffff"></circle>
                <text x="${centerX}" y="${centerY - 4}" text-anchor="middle" font-size="13" fill="#6b7280">总计</text>
                <text x="${centerX}" y="${centerY + 18}" text-anchor="middle" font-size="16" fill="#1f2937">${escapeXml(total.toFixed(2))}</text>
                <g class="chart-legend">
                    ${legends.join('')}
                </g>
            </svg>
        `;
    }

    async function readJsonResponse(response) {
        const rawText = await response.text();
        if (!rawText) {
            return {};
        }
        try {
            return JSON.parse(rawText);
        } catch (error) {
            throw new Error(`服务返回了非 JSON 内容：${rawText.slice(0, 160)}`);
        }
    }

    async function readBlobResponse(response) {
        if (response.ok) {
            return response.blob();
        }
        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
            const payload = await response.json();
            throw new Error(payload.error || '文件导出失败');
        }
        const rawText = await response.text();
        throw new Error(rawText || '文件导出失败');
    }

    function parseFileNameFromHeaders(response, fallbackName) {
        const disposition = response.headers.get('content-disposition') || '';
        const utf8Match = disposition.match(/filename\*=UTF-8''([^;]+)/i);
        if (utf8Match) {
            return decodeURIComponent(utf8Match[1]);
        }
        const plainMatch = disposition.match(/filename=\"?([^\";]+)\"?/i);
        if (plainMatch) {
            return plainMatch[1];
        }
        return fallbackName;
    }

    async function saveBlobWithPicker(blob, suggestedName, acceptConfig) {
        if ('showSaveFilePicker' in window) {
            const handle = await window.showSaveFilePicker({
                suggestedName,
                types: acceptConfig ? [acceptConfig] : undefined,
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return;
        }

        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = suggestedName;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
    }

    function extractSvgMarkup(html) {
        const match = String(html || '').match(/<svg[\s\S]*<\/svg>/i);
        return match ? match[0] : '';
    }

    function parseViewBox(svgMarkup) {
        const match = String(svgMarkup).match(/viewBox=\"([^\"]+)\"/i);
        if (!match) {
            return { width: 1200, height: 720 };
        }
        const parts = match[1].trim().split(/\s+/).map(Number);
        if (parts.length !== 4 || parts.some(value => !Number.isFinite(value))) {
            return { width: 1200, height: 720 };
        }
        return { width: parts[2], height: parts[3] };
    }

    async function svgMarkupToPngDataUrl(svgMarkup) {
        if (!svgMarkup) {
            return '';
        }
        const { width, height } = parseViewBox(svgMarkup);
        const svgBlob = new Blob([svgMarkup], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        try {
            const image = await new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('图表图片转换失败'));
                img.src = url;
            });
            const canvas = document.createElement('canvas');
            canvas.width = width * 2;
            canvas.height = height * 2;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/png');
        } finally {
            URL.revokeObjectURL(url);
        }
    }

    async function buildChartImagesPayload() {
        if (!currentResultState.chartItems || !currentResultState.chartItems.length) {
            return [];
        }

        const charts = [];
        const barHtml = renderBarChart(currentResultState.chartItems, currentResultState.chartTitle || '查询结果');
        const barSvg = extractSvgMarkup(barHtml);
        if (barSvg) {
            const barPng = await svgMarkupToPngDataUrl(barSvg);
            if (barPng) {
                charts.push({
                    title: `${currentResultState.chartTitle || '查询结果'} - 柱图`,
                    caption: '柱图快照由当前查询结果自动生成。',
                    png_data_url: barPng,
                });
            }
        }

        const pieSum = currentResultState.chartItems.reduce((sum, item) => sum + item.value, 0);
        if (pieSum > 0) {
            const pieHtml = renderPieChart(currentResultState.chartItems, currentResultState.chartTitle || '查询结果');
            const pieSvg = extractSvgMarkup(pieHtml);
            if (pieSvg) {
                const piePng = await svgMarkupToPngDataUrl(pieSvg);
                if (piePng) {
                    charts.push({
                        title: `${currentResultState.chartTitle || '查询结果'} - 饼图`,
                        caption: '饼图快照由当前查询结果自动生成。',
                        png_data_url: piePng,
                    });
                }
            }
        }
        return charts;
    }

    async function exportFile(url, payload, fallbackName, acceptConfig, successMessage) {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        const blob = await readBlobResponse(response);
        const fileName = parseFileNameFromHeaders(response, fallbackName);
        await saveBlobWithPicker(blob, fileName, acceptConfig);
        setStatus(successMessage, 'ok');
    }

    async function downloadDetailData() {
        if (!hasResultRows()) {
            setStatus('当前没有可下载的明细数据', 'error');
            return;
        }
        setStatus('正在准备明细数据导出，请选择保存位置...');
        await exportFile(
            '/api/export/data',
            { conversation_id: conversationId },
            'chatbi_detail.csv',
            {
                description: 'CSV 文件',
                accept: { 'text/csv': ['.csv'] },
            },
            '明细数据已导出'
        );
    }

    async function downloadChartWord() {
        if (!hasChartExport()) {
            setStatus('当前结果不适合生成图表快照', 'error');
            return;
        }
        setStatus('正在准备图表 Word，请选择保存位置...');
        const chartImages = await buildChartImagesPayload();
        await exportFile(
            '/api/export/chart-word',
            {
                conversation_id: conversationId,
                template_id: getSelectedTemplateId(),
                chart_images: chartImages,
            },
            'chart_snapshot.docx',
            {
                description: 'Word 文档',
                accept: { 'application/vnd.openxmlformats-officedocument.wordprocessingml.document': ['.docx'] },
            },
            '图表 Word 已导出'
        );
    }

    async function generateReportDocument() {
        if (!hasResultRows()) {
            setStatus('当前没有可生成报告的查询结果', 'error');
            return;
        }
        setStatus('报告生成任务已提交，完成后可在右下角下载任务中获取文件...');
        const chartImages = await buildChartImagesPayload();
        const response = await fetch('/api/report/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                conversation_id: conversationId,
                template_id: getSelectedTemplateId(),
                llm_provider: llmProviderSelect.value,
                chart_images: chartImages,
                client_id: clientId,
                async: true,
            }),
        });
        const data = await readJsonResponse(response);
        if (!response.ok) {
            throw new Error(data.error || '报告生成失败');
        }
        taskPanelOpen = true;
        taskPanelEl.classList.add('open');
        await loadTaskWidget();
        setStatus(`报告任务已提交：${data.task?.display_name || '商业分析报告'}`, 'ok');
    }

    async function downloadTemplateSample() {
        const templateId = getSelectedTemplateId();
        const sampleFormat = templateSampleFormatSelect.value || 'docx';
        const response = await fetch(`/api/report/templates/${encodeURIComponent(templateId || '')}/sample?format=${encodeURIComponent(sampleFormat)}`);
        const blob = await readBlobResponse(response);
        const fileName = parseFileNameFromHeaders(response, sampleFormat === 'txt' ? 'report_template_sample.txt' : 'report_template_sample.docx');
        await saveBlobWithPicker(
            blob,
            fileName,
            {
                description: sampleFormat === 'txt' ? '文本模板样例' : 'Word 模板样例',
                accept: sampleFormat === 'txt'
                    ? { 'text/plain': ['.txt'] }
                    : { 'application/vnd.openxmlformats-officedocument.wordprocessingml.document': ['.docx'] },
            }
        );
        setStatus('报告模板样例已下载', 'ok');
    }

    async function exportExecutionLogs() {
        const filterValue = logRoundFilterEl.value || 'all';
        const failedOnly = !!logFailedOnlyEl.checked;
        const logs = filterValue === 'all'
            ? currentExecutionLogs.slice()
            : currentExecutionLogs.filter(item => Number(item.round_no || 0) === Number(filterValue));
        const filteredLogs = failedOnly ? logs.filter(item => !!item.error_message) : logs;
        const payload = {
            conversation_id: conversationId,
            exported_at: new Date().toISOString(),
            filter: {
                round: filterValue,
                failed_only: failedOnly,
            },
            logs: filteredLogs,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
        await saveBlobWithPicker(
            blob,
            `chatbi_logs_${conversationId || 'conversation'}.json`,
            {
                description: 'JSON 日志',
                accept: { 'application/json': ['.json'] },
            }
        );
        setStatus('执行日志已导出', 'ok');
    }

    async function downloadTaskFile(taskId, fallbackName) {
        const response = await fetch(`/api/tasks/${encodeURIComponent(taskId)}/download`);
        const blob = await readBlobResponse(response);
        const fileName = parseFileNameFromHeaders(response, fallbackName || 'task_result.docx');
        await saveBlobWithPicker(
            blob,
            fileName,
            {
                description: 'Word 文档',
                accept: { 'application/vnd.openxmlformats-officedocument.wordprocessingml.document': ['.docx'] },
            }
        );
        setStatus(`任务文件已下载：${fileName}`, 'ok');
    }

    async function runQuery() {
        let question = questionInput.value.trim();
        let displayQuestion = question;

        if (!question && pendingTimeRefinement && lastTimeMeta.enabled) {
            question = buildRefinementQuestion();
            displayQuestion = `再次提问：${lastTimeMeta.dimension}调整为 ${formatTimeRangeDisplay(timeRangeStartEl.value, lastTimeMeta.granularity)} 到 ${formatTimeRangeDisplay(timeRangeEndEl.value, lastTimeMeta.granularity)}`;
        }

        if (!question) {
            setStatus('请先输入问题，或选择新的时间范围后再次提问', 'error');
            return;
        }

        addMessage('user', displayQuestion);
        questionInput.value = '';
        submitBtn.disabled = true;
        newConversationBtn.disabled = true;
        updateSubmitButtonText();
        persistLlmProvider(llmProviderSelect.value);
        setStatus(`正在使用 ${llmProviderSelect.options[llmProviderSelect.selectedIndex].text} 理解上下文、生成 SQL 并执行，请稍候...`);

        try {
            const response = await fetch('/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question,
                    conversation_id: conversationId,
                    llm_provider: llmProviderSelect.value,
                    client_id: clientId,
                })
            });
            const data = await readJsonResponse(response);

            if (!response.ok) {
                throw new Error(data.error || '请求失败');
            }

            conversationId = data.conversation_id || conversationId;
            persistConversationId();
            if (data.llm_provider) {
                llmProviderSelect.value = data.llm_provider;
                persistLlmProvider(data.llm_provider);
            }

            if (data.reply_type === 'clarify') {
                addMessage('assistant', data.assistant_message || '请补充更多信息。');
                updateContextIndicator(data.context_stats);
                await loadExecutionLogs();
                setStatus(`需要你补充信息后再继续执行（引擎：${data.llm_provider_label || data.llm_provider} / 模型：${data.model}）`);
                return;
            }

            applyResultPayload(data);
            await loadExecutionLogs();
            setStatus(`执行成功，返回 ${data.row_count} 行（引擎：${data.llm_provider_label || data.llm_provider} / 模型：${data.model}）`, 'ok');
        } catch (error) {
            addMessage('assistant', `执行失败：${error.message}`);
            loadExecutionLogs().catch(() => {});
            setStatus(`执行失败：${error.message}`, 'error');
        } finally {
            submitBtn.disabled = false;
            newConversationBtn.disabled = false;
            updateSubmitButtonText();
        }
    }

    submitBtn.addEventListener('click', runQuery);
    newConversationBtn.addEventListener('click', resetConversation);
    downloadDataBtn.addEventListener('click', () => {
        downloadDetailData().catch(error => {
            setStatus(`明细导出失败：${error.message}`, 'error');
        });
    });
    downloadChartWordBtn.addEventListener('click', () => {
        downloadChartWord().catch(error => {
            setStatus(`图表导出失败：${error.message}`, 'error');
        });
    });
    generateReportBtn.addEventListener('click', () => {
        generateReportDocument().catch(error => {
            setStatus(`报告生成失败：${error.message}`, 'error');
        });
    });
    downloadTemplateSampleBtn.addEventListener('click', () => {
        downloadTemplateSample().catch(error => {
            setStatus(`模板下载失败：${error.message}`, 'error');
        });
    });
    uploadTemplateBtn.addEventListener('click', () => {
        reportTemplateFileInput.click();
    });
    reportTemplateFileInput.addEventListener('change', event => {
        const file = event.target.files && event.target.files[0];
        if (!file) {
            return;
        }
        setStatus('正在上传并解析报告模板...');
        uploadReportTemplate(file)
            .then(message => setStatus(message || '报告模板上传成功，已自动解析样式', 'ok'))
            .catch(error => setStatus(`模板上传失败：${error.message}`, 'error'))
            .finally(() => {
                reportTemplateFileInput.value = '';
            });
    });
    questionInput.addEventListener('keydown', event => {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            runQuery();
        }
    });
    questionInput.addEventListener('input', updateSubmitButtonText);
    logRoundFilterEl.addEventListener('change', renderFilteredExecutionLogs);
    logFailedOnlyEl.addEventListener('change', renderFilteredExecutionLogs);
    exportLogBtn.addEventListener('click', () => {
        exportExecutionLogs().catch(error => {
            setStatus(`执行日志导出失败：${error.message}`, 'error');
        });
    });
    refreshLogBtn.addEventListener('click', () => {
        loadExecutionLogs().catch(error => {
            setStatus(`日志刷新失败：${error.message}`, 'error');
        });
    });
    taskBadgeEl.addEventListener('click', event => {
        event.stopPropagation();
        taskPanelOpen = !taskPanelOpen;
        taskPanelEl.classList.toggle('open', taskPanelOpen);
    });
    document.addEventListener('click', event => {
        if (!taskIndicator.contains(event.target)) {
            taskPanelOpen = false;
            taskPanelEl.classList.remove('open');
        }
    });
    llmProviderSelect.addEventListener('change', event => {
        persistLlmProvider(event.target.value);
        if (!currentResultState.rows.length) {
            updateContextIndicator(null);
        }
    });
    reportTemplateSelect.addEventListener('change', updateExportButtons);
    timeRangeStartEl.addEventListener('change', onTimeRangeChange);
    timeRangeEndEl.addEventListener('change', onTimeRangeChange);
    tableViewBtn.addEventListener('click', () => switchView('list'));
    barViewBtn.addEventListener('click', () => switchView('bar'));
    pieViewBtn.addEventListener('click', () => switchView('pie'));

    async function bootstrapPage() {
        try {
            await loadReportTemplates();
        } catch (error) {
            setStatus(`加载报告模板失败：${error.message}`, 'error');
        }
        try {
            await loadTaskWidget();
        } catch (error) {
            setStatus(`加载任务列表失败：${error.message}`, 'error');
        }
        startTaskPolling();
        await restoreConversation();
    }

    bootstrapPage();
</script>
</body>
</html>
